<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Cantik ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    overflow:hidden;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND */

.blur{
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(120px);
    animation:move 8s infinite alternate;
}

.blur1{
    background:#ff00ff;
    left:-100px;
    top:-100px;
}

.blur2{
    background:#00ffff;
    right:-100px;
    bottom:-100px;
}

@keyframes move{
    from{
        transform:translateY(-20px);
    }
    to{
        transform:translateY(20px);
    }
}

/* PARTICLES */

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* CARD */

.card{
    position:relative;
    width:350px;
    padding:25px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
    overflow:hidden;
    box-shadow:0 0 40px rgba(255,255,255,0.1);

}.slider{
    position:relative;
    width:85%;
    height:400px;
    overflow:hidden;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.slide{
    position:absolute;

    max-width:100%;
    max-height:100%;

    width:auto;
    height:auto;

    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    object-fit:contain;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

h1{
    margin-top:20px;
    color:white;
    font-size:35px;
    text-shadow:
        0 0 10px #ff00ff,
        0 0 20px #00ffff;
}

#message{
    margin-top:15px;
    color:white;
    font-size:18px;
    min-height:50px;
    transition:0.5s;
}

/* HEART */

.heart{
    position:absolute;
    color:red;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<canvas id="canvas"></canvas>

<div class="card">

<div class="slider">

<!-- GANTI FOTO -->
<img class="slide active" src="cantik1.jpg">
<img class="slide" src="cantik2.jpg">
<img class="slide" src="cantik3.jpg">

</div>

<h1>HBD CANTIK ❤️</h1>

<p id="message">
Semoga harimu selalu bahagia ✨
</p>

</div>

<script>

/* SLIDE FOTO */

const slides = document.querySelectorAll(".slide");

const messages = [
"Semoga harimu selalu bahagia ✨",
"Panjang umur dan sehat selalu 🤍",
"Jangan lupa senyum cantik terus 😆",
"Semoga semua impianmu tercapai 🌸",
"Stay cute and happy always ❤️"
];

let index = 0;

function changeSlide(){

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    index++;

    if(index >= slides.length){
        index = 0;
    }

    slides[index].classList.add("active");

    document.getElementById("message")
    .innerHTML = messages[index];

}

setInterval(changeSlide,3000);

/* PARTICLES */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*3;
        this.speedY = Math.random()*1 + 0.5;
    }

    update(){
        this.y += this.speedY;

        if(this.y > canvas.height){
            this.y = 0;
        }
    }

    draw(){
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<150;i++){
    particles.push(new Particle());
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();

/* LOVE RAIN */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize =
    Math.random()*20 + 20 + "px";

    heart.style.animationDuration =
    Math.random()*3 + 2 + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
