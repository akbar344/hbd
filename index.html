<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:#050510;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BACKGROUND */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#ff00ff33,transparent 30%),
    radial-gradient(circle at bottom right,#00ffff33,transparent 30%);
}

/* STARS */

canvas{
    position:absolute;
    inset:0;
}

/* CARD */

.card{
    position:relative;
    width:360px;
    padding:20px;
    border-radius:30px;
    overflow:hidden;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 40px rgba(255,0,255,0.2),
    0 0 80px rgba(0,255,255,0.1);

    animation:floating 5s ease-in-out infinite;
}

@keyframes floating{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* PROGRESS */

.progress{
    position:absolute;
    top:0;
    left:0;
    height:4px;
    width:0%;
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    animation:loading 4s linear infinite;
    z-index:10;
}

@keyframes loading{
    from{
        width:0%;
    }
    to{
        width:100%;
    }
}

/* SLIDER */

.slider{
    position:relative;
    width:100%;
    height:420px;
    overflow:hidden;
    border-radius:25px;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
    transform:scale(1);
}

.slide.active{
    opacity:1;
    animation:zoom 4s linear;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.08);
    }
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
    transparent,
    rgba(0,0,0,0.6)
    );
}

/* TEXT */

.content{
    position:absolute;
    bottom:25px;
    left:20px;
    right:20px;
    color:white;
    z-index:5;
}

h1{
    font-size:32px;
    font-weight:700;

    text-shadow:
    0 0 10px #ff00ff,
    0 0 20px #00ffff;
}

#message{
    margin-top:10px;
    font-size:16px;
    min-height:45px;
    color:#eee;
}

/* HEARTS */

.heart{
    position:absolute;
    color:red;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* MUSIC BUTTON */

.music-btn{
    position:absolute;
    top:15px;
    right:15px;

    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,0.15);
    color:white;
    font-size:18px;

    backdrop-filter:blur(10px);

    cursor:pointer;
    z-index:20;
}

</style>
</head>

<body>

<div class="bg"></div>

<canvas id="canvas"></canvas>

<div class="card">

<div class="progress"></div>

<button class="music-btn" onclick="toggleMusic()">
🎵
</button>

<div class="slider">

<!-- GANTI FOTO -->
<img class="slide active" src="cantik1.jpg">
<img class="slide" src="cantik1.jpg">
<img class="slide" src="cantik3.jpg">

<div class="overlay"></div>

<div class="content">

<h1>Happy Birthday DIVA❤️</h1>

<p id="message">
Semoga harimu selalu bahagia ✨
</p>

</div>

</div>

</div>

<!-- GANTI LAGU -->
<audio id="music" loop>
<source src="TULUS.mp3" type="audio/mpeg">
</audio>

<script>

/* SLIDE */

const slides = document.querySelectorAll(".slide");

const messages = [

"Semoga harimu selalu bahagia ✨",

"Panjang umur dan sehat selalu 🤍",

"Jangan lupa senyum terus cantik 😆",

"Semoga semua impianmu tercapai 🌸",

"Stay cute and happy always ❤️"

];

let index = 0;

function typeText(text){

    let i = 0;

    const message = document.getElementById("message");

    message.innerHTML = "";

    function typing(){

        if(i < text.length){

            message.innerHTML += text.charAt(i);

            i++;

            setTimeout(typing,40);

        }

    }

    typing();

}

function changeSlide(){

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    index++;

    if(index >= slides.length){
        index = 0;
    }

    slides[index].classList.add("active");

    typeText(messages[index]);

}

setInterval(changeSlide,4000);

/* MUSIC */

const music = document.getElementById("music");

function toggleMusic(){

    if(music.paused){

        music.play();

    }else{

        music.pause();

    }

}

/* STARS */

const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;

canvas.height = window.innerHeight;

let stars = [];

class Star{

    constructor(){

        this.x = Math.random()*canvas.width;

        this.y = Math.random()*canvas.height;

        this.size = Math.random()*2;

        this.speed = Math.random()*0.5 + 0.2;

    }

    update(){

        this.y += this.speed;

        if(this.y > canvas.height){

            this.y = 0;

            this.x = Math.random()*canvas.width;

        }

    }

    draw(){

        ctx.fillStyle = "white";

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

        ctx.fill();

    }

}

for(let i=0;i<150;i++){

    stars.push(new Star());

}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{

        star.update();

        star.draw();

    });

    requestAnimationFrame(animate);

}

animate();

/* LOVE RAIN */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize =
    Math.random()*20 + 15 + "px";

    heart.style.animationDuration =
    Math.random()*3 + 2 + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },5000);

}

setInterval(createHeart,250);

/* AUTO PLAY */

window.addEventListener("load", () => {

    const playMusic = () => {

        music.play()
        .then(()=>{

            console.log("music play");

        })
        .catch(err=>{

            console.log("autoplay blocked");

        });

    };

    playMusic();

    document.body.addEventListener("click", playMusic);

});

</script>

</body>
</html>
